<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三蘊 × Deep Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Dancing+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-tc-web@latest/style.css">

<style>
@font-face {
    font-family: 'ChenYuLuoYan';
    src: url('https://cdn.jsdelivr.net/gh/Chenyu-otf/chenyuluoyan_thin@main/ChenYuluoyan-2.0-Thin.ttf') format('truetype');
    font-display: swap;
}
html { font-size: 20px; }
:root {
    --primary: #9f9fb8;
    --accent: #353569;
}
*, body, input, button, select, textarea {
    font-family: 'Caveat', 'ChenYuLuoYan', "Microsoft JhengHei", sans-serif !important;
    -webkit-font-smoothing: antialiased;
}
body {
    margin: 0; padding: 0; height: 100vh; width: 100%;
    background-color: #F8FBF8;
    color: var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
}
.hub-logo {
    font-size: 2.4rem;
    letter-spacing: 4px;
    margin-bottom: 6vh;
    opacity: 0.9;
}
.hub-sub {
    font-family: 'LXGW WenKai TC', sans-serif !important;
    font-size: 0.85rem;
    color: #9898ba;
    margin-top: -4vh;
    margin-bottom: 6vh;
    letter-spacing: 2px;
}
.hub-links {
    display: flex;
    flex-direction: column;
    gap: 28px;
    width: 80%;
    max-width: 420px;
}
.hub-card {
    display: block;
    text-decoration: none;
    color: var(--accent);
    background: rgba(159, 159, 184, 0.08);
    border: 1px solid rgba(53, 53, 105, 0.15);
    border-radius: 14px;
    padding: 22px 20px;
    text-align: center;
    transition: transform 0.25s ease, background 0.25s ease;
}
.hub-card:hover, .hub-card:active {
    transform: translateY(-3px);
    background: rgba(159, 159, 184, 0.18);
}
.hub-card .title {
    font-size: 2rem;
    font-weight: 700;
    display: block;
    letter-spacing: 2px;
}
.hub-card .desc {
    font-family: 'LXGW WenKai TC', sans-serif !important;
    font-size: 0.85rem;
    color: #6a6a95;
    display: block;
    margin-top: 6px;
    letter-spacing: 1px;
}
.hub-footer {
    margin-top: 8vh;
    font-size: 0.8rem;
    opacity: 0.4;
    letter-spacing: 2px;
}
@media (max-width: 600px) {
    html { font-size: 16px; }
    .hub-logo { font-size: 2.1rem; }
    .hub-card .title { font-size: 1.7rem; }
}
</style>
</head>
<body>

    <div class="hub-logo">三蘊 × deep coffee</div>
    <div class="hub-sub">台東</div>

    <div class="hub-links">
        <a class="hub-card" href="sanyun-booking.html">
            <span class="title">三蘊</span>
            <span class="desc">民宿訂房 · 查看空房與須知</span>
        </a>
        <a class="hub-card" href="deepcoffee.html">
            <span class="title">Deep Coffee</span>
            <span class="desc">限量甜點 · 咖啡點餐</span>
        </a>
    </div>

    <div class="hub-footer">deep coffee family</div>

</body>
</html>
