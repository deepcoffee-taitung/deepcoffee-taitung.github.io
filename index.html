<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三蘊 × Deep Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Dancing+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-tc-web@latest/style.css">

<style>
@font-face {
    font-family: 'ChenYuLuoYan';
    src: url('https://cdn.jsdelivr.net/gh/Chenyu-otf/chenyuluoyan_thin@main/ChenYuluoyan-2.0-Thin.ttf') format('truetype');
    font-display: swap;
}
html { font-size: 20px; }
:root {
    /* Deep Coffee 品牌色（原本的藍紫色系） */
    --dc-accent: #353569;
    --dc-primary: #9f9fb8;
    --dc-sub: #6a6a95;

    /* 三蘊 品牌色（跟隨 logo 的灰色系） */
    --sy-accent: #4A484A;
    --sy-primary: #ACAAAB;
    --sy-sub: #7A787A;

    /* 首頁共用的中性色（不偏向任一品牌） */
    --neutral: #3A3A3A;
}
*, body, input, button, select, textarea {
    font-family: 'Caveat', 'ChenYuLuoYan', "Microsoft JhengHei", sans-serif !important;
    -webkit-font-smoothing: antialiased;
}
body {
    margin: 0; padding: 0; height: 100vh; width: 100%;
    background-color: #F8F8F8;
    color: var(--neutral);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
}
.hub-logo {
    font-size: 2.4rem;
    letter-spacing: 4px;
    margin-bottom: 6vh;
    opacity: 0.9;
}
.hub-logo .ttl-sanyun { color: var(--sy-accent); }
.hub-logo .ttl-cross { color: #23262B; } /* 深到接近黑的藍灰色，當作兩個品牌色的過渡 */
.hub-logo .ttl-deepcoffee { color: var(--dc-accent); }

.hub-links {
    display: flex;
    flex-direction: column;
    gap: 28px;
    width: 80%;
    max-width: 420px;
}
.hub-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    background: #FFFFFF;
    border: none;
    border-radius: 14px;
    padding: 26px 20px;
    text-align: center;
    box-shadow: 0 2px 14px rgba(0, 0, 0, 0.06);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.hub-card:hover, .hub-card:active {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
}
.hub-card .card-logo {
    max-width: 180px;
    max-height: 90px;
    object-fit: contain;
    margin-bottom: 12px;
}
.hub-card .desc {
    font-family: 'LXGW WenKai TC', sans-serif !important;
    font-size: 0.85rem;
    display: block;
    letter-spacing: 1px;
}

.hub-card.sanyun .desc { color: var(--sy-sub); }
.hub-card.deepcoffee .desc { color: var(--dc-sub); }

@media (max-width: 600px) {
    html { font-size: 16px; }
    .hub-logo { font-size: 2.1rem; }
    .hub-card .card-logo { max-width: 150px; max-height: 74px; }
}
</style>
</head>
<body>

    <div class="hub-logo"><span class="ttl-sanyun">三蘊</span> <span class="ttl-cross">×</span> <span class="ttl-deepcoffee">deep coffee</span></div>

    <div class="hub-links">
        <a class="hub-card sanyun" href="sanyun-booking.html">
            <img src="image-svg.jpg" class="card-logo" alt="三蘊">
            <span class="desc">民宿訂房 · 查看空房與須知</span>
        </a>
        <a class="hub-card deepcoffee" href="deepcoffee.html">
            <img src="logo.png" class="card-logo" alt="Deep Coffee">
            <span class="desc">限量甜點 · 咖啡點餐</span>
        </a>
    </div>

</body>
</html>
